<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Finora Business Card Front Redesign</title>
  <style>
    @page {
      size: 289.1339pt 189.9213pt;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 289.1339pt;
      height: 189.9213pt;
      margin: 0;
      background: #0a0a0a;
      font-family: Inter, Arial, sans-serif;
    }

    .card {
      position: relative;
      width: 289.1339pt;
      height: 189.9213pt;
      overflow: hidden;
      color: #d4af37;
      background:
        radial-gradient(circle at 79% 34%, rgba(212, 175, 55, 0.12), transparent 31%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.055), transparent 28%),
        repeating-linear-gradient(28deg, rgba(255, 255, 255, 0.018) 0, rgba(255, 255, 255, 0.018) 1px, transparent 1px, transparent 4px),
        #0a0a0a;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10.8pt;
      border: 0.9pt solid rgba(212, 175, 55, 0.92);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.09) 0.45px, transparent 0.45px);
      background-size: 3px 3px;
      opacity: 0.18;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .services {
      position: absolute;
      left: 28pt;
      top: 28pt;
      width: 130pt;
      z-index: 1;
    }

    .services-title {
      margin: 0 0 8pt;
      color: #ffffff;
      font-size: 7.8pt;
      font-weight: 500;
      letter-spacing: 1.25pt;
      text-transform: uppercase;
    }

    .rule {
      width: 37pt;
      height: 1pt;
      margin-bottom: 9pt;
      background: #d4af37;
    }

    .service-list {
      display: grid;
      gap: 5.1pt;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #d4af37;
      font-size: 7.55pt;
      line-height: 1.16;
      font-weight: 600;
      letter-spacing: 0.12pt;
    }

    .service-list li {
      display: grid;
      grid-template-columns: 6pt 1fr;
      align-items: start;
      column-gap: 5.5pt;
      min-height: 8pt;
    }

    .service-list li::before {
      content: "";
      width: 3.2pt;
      height: 3.2pt;
      margin-top: 2.7pt;
      border-radius: 50%;
      background: #d4af37;
      box-shadow: 0 0 5pt rgba(212, 175, 55, 0.46);
    }

    .divider {
      position: absolute;
      left: 164pt;
      top: 30pt;
      width: 0.75pt;
      height: 121pt;
      background: linear-gradient(transparent, rgba(212, 175, 55, 0.9) 12%, rgba(212, 175, 55, 0.9) 88%, transparent);
      z-index: 1;
    }

    .logo-wrap {
      position: absolute;
      right: 28pt;
      top: 31pt;
      width: 79pt;
      z-index: 1;
      text-align: center;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 4pt rgba(212, 175, 55, 0.28));
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 18.8pt;
      z-index: 1;
      color: #ffffff;
      font-size: 6.9pt;
      font-weight: 500;
      letter-spacing: 1.45pt;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Finora business card front redesign">
    <section class="services" aria-label="Services">
      <h1 class="services-title">Services</h1>
      <div class="rule"></div>
      <ul class="service-list">
        <li>Bookkeeping</li>
        <li>VAT / CT Support</li>
        <li>Payroll &amp; Financial Reports</li>
        <li>Budgeting &amp; Forecasting</li>
        <li>Cash Flow Management</li>
        <li>Expense Control</li>
      </ul>
    </section>
    <div class="divider" aria-hidden="true"></div>
    <section class="logo-wrap" aria-label="Finora Business Solutions">
      <img class="logo" src="Logo-hero.png" alt="Finora Business Solutions">
    </section>
    <footer class="footer">Professional &amp; Confidential</footer>
  </main>
</body>
</html>
